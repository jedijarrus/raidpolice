services:
  cla-webapp:
    build: .
    container_name: cla-webapp
    restart: unless-stopped
    volumes:
      - cla-data:/app/data
      - ./js:/app/js
      - ./css:/app/css
      - ./index.html:/app/index.html
      - ./server.js:/app/server.js
      - ./db.js:/app/db.js
      - ./preanalyze.js:/app/preanalyze.js
      - ./progression.js:/app/progression.js
      - ./RELEASE_NOTES.md:/app/RELEASE_NOTES.md
    networks:
      - pangolin

volumes:
  cla-data:

networks:
  pangolin:
    external: true
